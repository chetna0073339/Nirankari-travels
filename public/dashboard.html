<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ff6600;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.view{
background:#3b82f6;
color:white;
}

.delete{
    background:#ef4444;
color:white;
}

.whatsapp{
background:#22c55e;
color:white;
}

.logout{
position:absolute;
right:20px;
top:20px;
background:#ef4444;
color:white;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Admin Dashboard
<button class="logout">Logout</button>
</header>

<div class="container">

<h2>All Bookings</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookingTable">



<button class="view">View</button>
<button class="delete">Delete</button>
<button class="whatsapp">WhatsApp</button>
</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
