<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#333;
color:white;
}

button{
padding:5px 10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Service</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

<script>

async function loadBookings(){

const res = await fetch("/admin/bookings");

const data = await res.json();
const table = document.getElementById("bookingTable");

table.innerHTML="";

data.forEach((b,index)=>{

table.innerHTML+=`

<tr>

<td>${b.name}</td>
<td>${b.phone}</td>
<td>${b.service}</td>
<td>${b.date}</td>

<td>
<button onclick="deleteBooking(${index})">
Delete
</button>
</td>

</tr>

`;

});

}

async function deleteBooking(index){

await fetch("/admin/bookings/"+index,{
method:"DELETE"
});

loadBookings();

}

loadBookings();

</script>

</body>

</html>
